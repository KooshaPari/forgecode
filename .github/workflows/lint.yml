name: lint
permissions:
  contents: read

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
  push:
    branches:
      - main

jobs:
  fmt:
    name: "Format check (rustfmt)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262

      - name: Setup Rust toolchain (stable + rustfmt)
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659
        with:
          toolchain: stable
          components: rustfmt

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  clippy:
    name: "Clippy (-D warnings)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262

      - name: Install system deps
        run: sudo apt-get update -q && sudo apt-get install -y libsqlite3-dev protobuf-compiler

      - name: Setup Rust toolchain (stable + clippy)
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659
        with:
          toolchain: stable
          components: clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@c44f6b046f1c29ae5918b1e0bfdbb2f1813836fd

      - name: cargo clippy -D warnings
        env:
          RUSTFLAGS: "-D warnings"
        run: cargo clippy --all-targets --all-features -- -D warnings
