name: autofix.ci
permissions:
  contents: read
env:
  RUSTFLAGS: '-Dwarnings'
'on':
  pull_request:
    types:
    - opened
    - synchronize
    - reopened
    branches:
    - main
  push:
    branches:
    - main
jobs:
  lint:
    # Advisory-only: auto-commits style fixes via autofix.ci.
    # Blocking gates live in lint.yml (fmt --check) and test.yml (nextest).
    # This job must NOT block merges — it is informational.
    name: Lint Fix (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    steps:
    - name: Checkout Code
      uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803
    - name: Install SQLite
      run: sudo apt-get install -y libsqlite3-dev
    - name: Setup Protobuf Compiler
      uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
    - name: Setup Rust Toolchain
      uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659
      with:
        toolchain: nightly
        components: clippy, rustfmt
    - name: Setup Zig
      uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29
      with:
        version: 0.16.0
    - name: Cargo Fmt
      run: cargo +nightly fmt --all
    - name: Cargo Clippy
      run: cargo +nightly clippy --all-features --workspace --all-targets --fix --allow-dirty -- -D warnings
    - name: Cargo Clippy String Safety
      run: cargo +nightly clippy --all-features --workspace -- -D clippy::string_slice -D clippy::indexing_slicing -D clippy::disallowed_methods
    - name: Autofix
      uses: autofix-ci/action@7a166d7532b277f34e16238930461bf77f9d7ed8
concurrency:
  group: autofix-${{github.ref}}
  cancel-in-progress: false
