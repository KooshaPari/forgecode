name: Release ForgeCode

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            extension: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            extension: tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            extension: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            extension: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            extension: zip

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: arduino/setup-protoc@v3
      - name: Install Linux ARM64 cross-compilation toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}
      - name: Build forge-dev
        run: cargo build --locked --features dev-binary --release --target ${{ matrix.target }} --bin forge-dev
      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/package
          if [[ "${{ matrix.extension }}" == "zip" ]]; then
            cp "target/${{ matrix.target }}/release/forge-dev.exe" dist/package/forge-dev.exe
            (cd dist/package && 7z a "../forge-dev-${{ matrix.target }}.zip" forge-dev.exe)
          else
            cp "target/${{ matrix.target }}/release/forge-dev" dist/package/forge-dev
            tar -czf "dist/forge-dev-${{ matrix.target }}.tar.gz" -C dist/package forge-dev
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: forge-dev-${{ matrix.target }}
          path: dist/forge-dev-${{ matrix.target }}.${{ matrix.extension }}
          if-no-files-found: error

  assemble:
    name: Assemble release assets
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true
      - name: Add installer and checksums
        run: |
          set -euo pipefail
          cp scripts/install.sh release/install.sh
          chmod 0755 release/install.sh
          (cd release && sha256sum forge-dev-* > SHA256SUMS)
      - name: Validate A+ release contract
        run: scripts/release-scorecard.sh --release-dir release --version "${{ github.ref_name }}"
      - uses: actions/upload-artifact@v4
        with:
          name: forgecode-release-assets
          path: release/
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: assemble
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: forgecode-release-assets
          path: release
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          fail_on_unmatched_files: true
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
