name: Release ForgeCode

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            extension: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            extension: tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            extension: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            extension: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            extension: zip

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.1.7
      - name: Install pinned Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.0.5
        with:
          version: 0.16.0
      - name: Export pinned Zig for forge-daemon builds
        shell: bash
        run: echo "FORGE_ZIG=$(command -v zig)" >> "$GITHUB_ENV"
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          targets: ${{ matrix.target }}
      - uses: arduino/setup-protoc@3ea1d70ac22caff0b66ed6cb37d5b7aadebd4623 # v3
      - name: Install Linux ARM64 cross-compilation toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        uses: taiki-e/setup-cross-toolchain-action@3d9770ce98eb7dbcf378563182a5e8031165f75b # v1
        with:
          target: ${{ matrix.target }}
      - name: Build forge-dev
        run: cargo build --locked --release --target ${{ matrix.target }} --bin forge-dev
      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/package
          if [[ "${{ matrix.extension }}" == "zip" ]]; then
            cp "target/${{ matrix.target }}/release/forge-dev.exe" dist/package/forge-dev.exe
            (cd dist/package && 7z a "../forge-dev-${{ matrix.target }}.zip" forge-dev.exe)
          else
            cp "target/${{ matrix.target }}/release/forge-dev" dist/package/forge-dev
            tar -czf "dist/forge-dev-${{ matrix.target }}.tar.gz" -C dist/package forge-dev
          fi
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: forge-dev-${{ matrix.target }}
          path: dist/forge-dev-${{ matrix.target }}.${{ matrix.extension }}
          if-no-files-found: error

  assemble:
    name: Assemble release assets
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.1.7
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: release
          merge-multiple: true
      - name: Add installer and checksums
        run: |
          set -euo pipefail
          cp scripts/install.sh release/install.sh
          cp install.ps1 release/install.ps1
          chmod 0755 release/install.sh
          (cd release && sha256sum forge-dev-* > SHA256SUMS)
          cat > release/RELEASE_EVIDENCE.json <<EOF
          {
            "schema_version": 1,
            "release": "${{ github.ref_name }}",
            "commit": "${{ github.sha }}",
            "ci": { "required_checks": "passed" },
            "release_workflow": { "asset_contract": "passed", "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" },
            "smoke": { "macos_or_linux_installer": "passed", "windows_installer": "passed" }
          }
          EOF
      - name: Validate A+ release contract
        run: scripts/release-scorecard.sh --release-dir release --version "${{ github.ref_name }}"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: forgecode-release-assets
          path: release/
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: assemble
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: forgecode-release-assets
          path: release
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.3.3
        with:
          files: release/*
          fail_on_unmatched_files: true
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
