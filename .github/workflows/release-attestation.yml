name: Release Attestation

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  build-and-attest:
    name: Build and Attest (SLSA Build L2)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    env:
      CARGO_WORKDIR: .
    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.1.7
        with:
          fetch-depth: 0

      - name: Install pinned Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.0.5
        with:
          version: 0.16.0

      - name: Export pinned Zig for forge-daemon builds
        shell: bash
        run: echo "FORGE_ZIG=$(command -v zig)" >> "$GITHUB_ENV"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: |
            . -> target

      - name: Build release artifacts
        working-directory: ${{ env.CARGO_WORKDIR }}
        run: |
          set -euo pipefail
          cargo build --release --locked --workspace --all-targets

      - name: Stage release artifacts
        working-directory: ${{ env.CARGO_WORKDIR }}
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          # Copy all built executables
          find target/release -maxdepth 1 -type f -executable \
            -exec cp -t release-artifacts/ {} + 2>/dev/null || true
          # Source tarball
          tar \
            --exclude='./target' \
            --exclude='./.git' \
            --exclude='./release-artifacts' \
            -czf release-artifacts/source.tar.gz \
            -C "$GITHUB_WORKSPACE/${{ env.CARGO_WORKDIR }}" .
          # Build manifest
          cat > release-artifacts/BUILD_MANIFEST.txt <<EOF
          # Release Build Manifest
          repository: ${{ github.repository }}
          ref:        ${{ github.ref }}
          sha:        ${{ github.sha }}
          runner:     ${{ runner.os }}
          rustc:      $(rustc --version)
          cargo:      $(cargo --version)
          built_at:   $(date -u +%Y-%m-%dT%H:%M:%SZ)
          EOF
          echo "=== Release artifacts ==="
          ls -la release-artifacts/

      - name: Upload artifacts for provenance
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-artifacts
          path: ${{ env.CARGO_WORKDIR }}/release-artifacts/
          if-no-files-found: warn
          retention-days: 90

      - name: Attest build provenance (SLSA Build L2)
        uses: slsa-framework/slsa-github-generator/attest-build-provenance@4d014fae4dbd39eb09e8d40348b73db095e6ba9a # v1
        with:
          artifact-name: release-artifacts
